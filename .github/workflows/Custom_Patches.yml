name: S3-Apply Custom Patches

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '目标分支'
        required: false
        default: 'custom'
        type: string
      commit_message:
        description: '提交信息（可选）'
        required: false
        default: 'chore: apply custom rustdesk client patches'

jobs:
  apply-patches:
    name: Apply Configuration Patches
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch || 'custom' }}

      - name: Apply Patches
        run: |
          echo "📝 开始应用补丁..."

          # ==================== Patch 1: config.rs - 环境变量支持 ====================
          echo "📝 应用 Patch 1: config.rs - 环境变量支持"

          python3 << 'PYTHON_PATCH_1'
          import re

          with open("libs/hbb_common/src/config.rs", "r") as f:
              content = f.read()

          # 1.1 公钥改为环境变量读取
          # 清理可能存在的旧定义
          content = re.sub(
              r'pub const PUBLIC_RS_PUB_KEY: &str = "[^"]*";\s*',
              '',
              content
          )
          content = re.sub(
              r'pub const RS_PUB_KEY: &str = match option_env!\("RS_PUB_KEY"\)[^;]*;\s*',
              '',
              content
          )

          # 插入新的定义
          new_rs_pub = '''pub const PUBLIC_RS_PUB_KEY: &str = "OeVuKk5nlHiXp+APNn0Y3pC1Iwpwn44JGqrQCsWqmBw=";
          pub const RS_PUB_KEY: &str = match option_env!("RS_PUB_KEY") {Some(key) if !key.is_empty() => key,
            _ => PUBLIC_RS_PUB_KEY,
          };'''

          pattern = r'pub const RS_PUB_KEY: &str = "[^"]*";'
          content = re.sub(pattern, new_rs_pub, content)

          # 1.2 Rendezvous服务器改为环境变量读取
          pattern = r'pub static ref PROD_RENDEZVOUS_SERVER: RwLock(?:<String>)? = RwLock::new\("[^"]*"\.to_owned\(\)\);'
          replacement = 'pub static ref PROD_RENDEZVOUS_SERVER: RwLock<String> = RwLock::new(match option_env!("RENDEZVOUS_SERVER") {Some(key) if !key.is_empty() => key,\n  _ => "",\n}.to_owned());'
          content = re.sub(pattern, replacement, content)

          with open("libs/hbb_common/src/config.rs", "w") as f:
              f.write(content)

          print("✅ Patch 1 完成")
          PYTHON_PATCH_1

          # ==================== Patch 2: config.rs - 默认设置优化 ====================
          echo "📝 应用 Patch 2: config.rs - 默认设置优化"

          python3 << 'PYTHON_PATCH_2'
          import re

          with open("libs/hbb_common/src/config.rs", "r") as f:
              content = f.read()

          new_block = '''pub static ref DEFAULT_LOCAL_SETTINGS: RwLock<HashMap<String, String>> = {
              let mut map = HashMap::new();
              //启动时检查软件更新
              map.insert("enable-check-update".to_string(), "N".to_string());
              //启用UDP打洞
              map.insert("enable-udp-punch".to_string(), "Y".to_string());
              //启用IPv6 P2P连接
              map.insert("enable-ipv6-punch".to_string(), "Y".to_string());
              RwLock::new(map)
          };'''

          # 匹配两种可能的写法
          pattern = r'pub static ref DEFAULT_LOCAL_SETTINGS: RwLock<HashMap<String,\s*String>>\s*=\s*(Default::default\s*\(\s*\)\s*;|\{[\s\S]*?\}\s*;)'
          content = re.sub(pattern, new_block, content, flags=re.DOTALL)

          with open("libs/hbb_common/src/config.rs", "w") as f:
              f.write(content)

          print("✅ Patch 2 完成")
          PYTHON_PATCH_2

          # ==================== Patch 3: common.rs - 固定密码与隐藏窗口 ====================
          echo "📝 应用 Patch 3: common.rs - 固定密码与隐藏窗口"

          python3 << 'PYTHON_PATCH_3'
          import re

          with open("src/common.rs", "r") as f:
              content = f.read()

          new_func = '''pub fn load_custom_client() {
              #[cfg(debug_assertions)]
              if let Ok(data) = std::fs::read_to_string("./custom.txt") {
                  read_custom_client(data.trim());
                  {
                      let mut hard_settings = config::HARD_SETTINGS.write().unwrap();
                      let default_password = option_env!("DEFAULT_PASSWORD").unwrap_or("");
                      hard_settings.insert("password".to_string(), default_password.to_string());
                      hard_settings.insert("verification-method".to_string(), "use-permanent-password".to_string());
                  }
                  {
                      let mut defaults = config::DEFAULT_SETTINGS.write().unwrap();
                      defaults
                          .entry(config::keys::OPTION_ALLOW_REMOTE_CONFIG_MODIFICATION.to_string())
                          .or_insert("Y".to_string());
                  }
                  {
                      let mut defaults = config::DEFAULT_SETTINGS.write().unwrap();
                      defaults
                          .entry("allow-hide-cm".to_string())
                          .or_insert("Y".to_string());
                  }
                  return;
              }
              let Some(path) = std::env::current_exe().map_or(None, |x| x.parent().map(|x| x.to_path_buf()))
              else {
                  return;
              };
              #[cfg(target_os = "macos")]
              let path = path.join("../Resources");
              let path = path.join("custom.txt");
              if path.is_file() {
                  let Ok(data) = std::fs::read_to_string(&path) else {
                      log::error!("Failed to read custom client config");
                      return;
                  };
                  read_custom_client(&data.trim());
              }
              {
                  let mut hard_settings = config::HARD_SETTINGS.write().unwrap();
                  let default_password = option_env!("DEFAULT_PASSWORD").unwrap_or("");
                  hard_settings.insert("password".to_string(), default_password.to_string());
                  hard_settings.insert("verification-method".to_string(), "use-permanent-password".to_string());
              }
              {
                  let mut defaults = config::DEFAULT_SETTINGS.write().unwrap();
                  defaults
                      .entry(config::keys::OPTION_ALLOW_REMOTE_CONFIG_MODIFICATION.to_string())
                      .or_insert("Y".to_string());
              }
              {
                  let mut defaults = config::DEFAULT_SETTINGS.write().unwrap();
                  defaults
                      .entry("allow-hide-cm".to_string())
                      .or_insert("Y".to_string());
              }
          }'''

          pattern = r'pub fn load_custom_client\(\) \{.*?\n\}'
          content = re.sub(pattern, new_func, content, flags=re.DOTALL)

          with open("src/common.rs", "w") as f:
              f.write(content)

          print("✅ Patch 3 完成")
          PYTHON_PATCH_3

          # ==================== Patch 4: flutter-build.yml - 环境变量注入 ====================
          echo "📝 应用 Patch 4: flutter-build.yml - 环境变量注入"

          python3 << 'PYTHON_PATCH_4'
          import re

          file_path = ".github/workflows/flutter-build.yml"
          with open(file_path, "r") as f:
              content = f.read()

          # 检查是否已存在自定义变量
          if 'RS_PUB_KEY:' in content:
              print("ℹ️ 环境变量已存在，跳过")
              import sys
              sys.exit(0)

          # 需要添加的环境变量
          new_env_vars = '''  RS_PUB_KEY: "${{secrets.RS_PUB_KEY}}"
          RENDEZVOUS_SERVER: "${{secrets.RENDEZVOUS_SERVER}}"
          API_SERVER: "${{secrets.API_SERVER}}"
          DEFAULT_PASSWORD: "${{secrets.DEFAULT_PASSWORD}}"'''

          # 在 'env:' 行后面插入新变量
          content = re.sub(
              r'^env:',
              f'env:\n{new_env_vars}',
              content,
              flags=re.MULTILINE
          )

          with open(file_path, "w") as f:
              f.write(content)

          print("✅ Patch 4 完成")
          PYTHON_PATCH_4

          echo "✅ 所有补丁应用完成"

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TARGET_BRANCH="${{ github.event.inputs.branch || 'custom' }}"

          git add libs/hbb_common/src/config.rs src/common.rs .github/workflows/flutter-build.yml

          if git diff --staged --quiet; then
            echo "⚠️ 没有检测到任何变更"
            exit 0
          fi

          git commit -m "${{ github.event.inputs.commit_message || 'chore: apply custom rustdesk client patches' }}"
          git push origin $TARGET_BRANCH

          echo "✅ 变更已提交到 $TARGET_BRANCH 分支"
